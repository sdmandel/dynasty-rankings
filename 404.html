<title>404 — Backyard Dynasty Baseball</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e0f; --gold: #c8a84b; --text: #f0ede6;
  --text-muted: #7a7872; --text-dead: #4a4845; --border2: #2a2a2c;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.wrap { max-width: 480px; padding: 40px; text-align: center; }
.eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 20vw, 160px);
  line-height: 0.88; letter-spacing: 0.02em; color: var(--text);
  margin-bottom: 24px;
}
h1 span { color: var(--gold); }
p { font-size: 14px; color: var(--text-muted); line-height: 1.75; margin-bottom: 32px; }
a.home-btn {
  display: inline-block; text-decoration: none;
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 12px 28px; color: var(--text-dead);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  transition: border-color 0.15s, color 0.15s;
}
a.home-btn:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Backyard Dynasty Baseball &nbsp;&#183;&nbsp; 2026</div>
  <h1>4<span>0</span>4</h1>
  <p>The Oracle couldn't find that page. It may have been dropped, traded away, or just never existed.</p>
  <a href="/index.html" class="home-btn">← Back to The Hub</a>
</div>
</body>
</html>
