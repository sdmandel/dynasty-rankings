name: Bug Report
description: Something isn't working right
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: impact_repo
    attributes:
      label: Impacts repo(s)
      description: Use one issue list here even when work lands in fantrax-bot.
      options:
        - site (sdmandel/dynasty-rankings)
        - bot (sdmandel/fantrax-bot)
        - both
    validations:
      required: true
  - type: dropdown
    id: impact_area
    attributes:
      label: Area
      options:
        - site
        - bot
        - pipeline
        - prompt-gen
        - data
        - deploy
        - infra
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what went wrong.
      placeholder: e.g. "The standings page shows an error when I load it"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
