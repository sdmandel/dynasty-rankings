name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        run: python -m pytest tests/ -x -q

  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install html5validator
        run: python -m pip install --upgrade pip html5validator
      - name: Validate HTML
        run: html5validator --root . --match "*.html" --ignore-re "Attribute .* not allowed" --ignore-re "Element .*script.*"
        continue-on-error: true
